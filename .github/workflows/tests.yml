name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: test (emacs ${{ matrix.emacs_version }})
    strategy:
      fail-fast: false
      matrix:
        # internal--get-default-lexical-binding-function landed in Emacs 31, so
        # the lexical-binding test self-skips on 29.4 and 30.1 and actually runs
        # on snapshot (Emacs master).
        emacs_version: ['29.4', '30.1', 'snapshot']
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install sbcl and a minimal LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            sbcl texlive-latex-base texlive-latex-recommended

      - name: Versions
        run: |
          sbcl --version
          emacs --version | head -1
          pdflatex --version | head -1

      - name: Run tests
        run: make test
